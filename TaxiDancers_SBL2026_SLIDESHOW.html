  }
  .ambient::before {
    width: 70vw; height: 70vw;

    width: 60vw; height: 60vw;

    animation: floatA 24s ease-in-out infinite reverse;

  /* ── En-tête fixe ── */

    opacity: 0;
    pointer-events: none;
    will-change: transform, opacity;
  }
  .slide.active {
    opacity: 1;
    pointer-events: auto;
    animation: slideEnter .65s cubic-bezier(.23,1,.32,1) both;
  }
  .slide.exit-left  { animation: slideExitLeft  .5s cubic-bezier(.55,0,1,.45) both; pointer-events: none; }
  .slide.exit-right { animation: slideExitRight .5s cubic-bezier(.55,0,1,.45) both; pointer-events: none; }
  .slide.enter-right { animation: slideEnterRight .65s cubic-bezier(.23,1,.32,1) both; }

  @keyframes slideEnter      { from { opacity:0; transform:translateX(60px)  scale(.97); } to { opacity:1; transform:translateX(0) scale(1); } }

  @keyframes slideExitLeft   { from { opacity:1; transform:translateX(0); } to { opacity:0; transform:translateX(-80px); } }
  @keyframes slideExitRight  { from { opacity:1; transform:translateX(0); } to { opacity:0; transform:translateX(80px); } }

    overflow: hidden;
  }

    to   { transform: scale(1.02); }

  {

    accentGrad: 'linear-gradient(180deg,#7B1FA2,#E040FB)',

    amb1: '#E040FB', amb2: '#9C27B0',
    styles: ['Mambo On2', 'New-York Style', 'Cha-Cha', 'Salsa NY'],
    soirees: ['Mercredi', 'Jeudi', 'Vendredi', 'Samedi'],
  },
];

const DURATION = 6000;
let current = 0, paused = false, timer = null;

const stage       = document.getElementById('stage');
const dotsWrap    = document.getElementById('dots');
const progressFill = document.getElementById('progressFill');
const ambient     = document.getElementById('ambient');

/* ── Build slides ── */
DANCERS.forEach((d, i) => {
  const slide = document.createElement('div');
  slide.className = 'slide';
  slide.dataset.index = i;

  const chipsCls = d.group; // 'cubano' or 'mambo'

  const stylesHTML = d.styles.map(s =>
    `<span class="chip-sl ${chipsCls}">${s}</span>`
  ).join('');

  slide.innerHTML = `
    <div class="accent-bar" style="background:${d.accentGrad};"></div>
    <div class="slide-photo">
      <img src="${d.photo}" alt="${d.name}">
      <div class="photo-gradient"></div>
    </div>
    <div class="slide-info">
      <div class="dancer-counter">${i + 1} / ${DANCERS.length}</div>
      <div class="group-badge ${d.group}">${d.groupIcon} ${d.groupLabel}</div>
      <div class="dancer-name-sl ${d.group}">${d.name}</div>
      <div class="styles-label-sl">Style de danse</div>
      <div class="styles-list-sl">${stylesHTML}</div>
      <div class="bracelet-sl">
        <div class="bracelet-band"></div>
        <span class="bracelet-sl-text">BRACELET FLUO — Signe de reconnaissance</span>
      </div>
      <div class="dates-sl">
        Présent(e) les 4 soirées ·
        <span>13</span> → <span>16 mai 2026</span>
        &nbsp;·&nbsp; Espace Caraïbes
      </div>
    </div>`;

  stage.appendChild(slide);
});

/* ── Build dots ── */
DANCERS.forEach((d, i) => {
  const dot = document.createElement('div');
  dot.className = 'dot';
  if (i === 0) dot.classList.add('active-' + DANCERS[0].group);
  dot.addEventListener('click', () => goTo(i));
  dotsWrap.appendChild(dot);
});

/* ── Ambient ── */
function updateAmbient(d) {
  document.documentElement.style.setProperty('--amb1', d.amb1);
  document.documentElement.style.setProperty('--amb2', d.amb2);
}

/* ── Progress ── */
function startProgress() {
  progressFill.style.transition = 'none';
  progressFill.style.width = '0%';
  requestAnimationFrame(() => requestAnimationFrame(() => {
    progressFill.classList.add('running');
    progressFill.style.transitionDuration = DURATION + 'ms';
    progressFill.style.width = '100%';
  }));
}
function stopProgress() {
  progressFill.classList.remove('running');
  progressFill.style.transition = 'none';
  progressFill.style.width = '0%';
}

/* ── Show slide ── */
function showSlide(index, dir) {
  const slides = stage.querySelectorAll('.slide');
  const dots   = dotsWrap.querySelectorAll('.dot');

  const prev = stage.querySelector('.slide.active');
  if (prev) {
    prev.classList.remove('active');
    prev.classList.add(dir > 0 ? 'exit-left' : 'exit-right');
    setTimeout(() => prev.classList.remove('exit-left', 'exit-right'), 500);
  }

  slides[index].classList.add('active');
  if (dir < 0) {
    slides[index].classList.remove('active');
    slides[index].classList.add('enter-right');
    requestAnimationFrame(() => {
      slides[index].classList.remove('enter-right');
      slides[index].classList.add('active');
    });
  }

  dots.forEach((dot, i) => {
    dot.classList.remove('active-cubano', 'active-mambo');
    if (i === index) dot.classList.add('active-' + DANCERS[index].group);
  });

  updateAmbient(DANCERS[index]);
  current = index;
  if (!paused) startProgress();
}

function goTo(index, dir) {
  if (index === current) return;
  const d = dir !== undefined ? dir : (index > current ? 1 : -1);
  stopProgress();
  showSlide(index, d);
  resetTimer();
}

function next() { goTo((current + 1) % DANCERS.length, 1); }
function prev() { goTo((current - 1 + DANCERS.length) % DANCERS.length, -1); }

function resetTimer() {
  clearTimeout(timer);
  if (!paused) timer = setTimeout(next, DURATION);
}

/* ── Controls ── */
document.getElementById('btnNext').addEventListener('click', () => next());
document.getElementById('btnPrev').addEventListener('click', () => prev());
document.getElementById('btnPause').addEventListener('click', () => {
  paused = !paused;
  document.getElementById('btnPause').textContent = paused ? '▶' : '⏸';
  if (paused) { clearTimeout(timer); stopProgress(); }
  else { startProgress(); resetTimer(); }
});
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight') next();
  else if (e.key === 'ArrowLeft') prev();
  else if (e.key === ' ') { e.preventDefault(); document.getElementById('btnPause').click(); }
});

/* ── Init ── */
showSlide(0, 1);
resetTimer();
</script>
